<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

#error{
    color:red;
    text-align:center;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<h2>Sign In</h2>

<form id="loginForm">

    <input
        type="email"
        id="email"
        placeholder="Enter your email"
        required>

    <input
        type="password"
        id="password"
        placeholder="Enter your password"
        required>

    <button type="submit">
        Sign In
    </button>

</form>

<p id="error"></p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(event){

    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if(email === ""){
        document.getElementById("error").textContent = "Please enter your email.";
        return;
    }

    if(password === ""){
        document.getElementById("error").textContent = "Please enter your password.";
        return;
    }

document.getElementById("error").textContent = "";

alert("Login Successful");

console.log("Email:", email);
console.log("Password:", password);

});

</script>

</body>
</html>
